name: Nick Inactivity Check

on:
  schedule:
    - cron: '0 12 * * *'   # 8:00am EDT
    - cron: '0 15 * * *'   # 11:00am EDT
    - cron: '0 18 * * *'   # 2:00pm EDT
    - cron: '0 21 * * *'   # 5:00pm EDT
    - cron: '0 23 * * *'   # 7:00pm EDT
    - cron: '0 01 * * *'   # 9:00pm EDT
  workflow_dispatch:

jobs:
  check-inactivity:
    runs-on: ubuntu-latest
    steps:
      - name: Check Nick inactivity
        run: |
          curl -s -X POST "${{ secrets.APP_URL }}/api/cron/nick-inactivity" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
